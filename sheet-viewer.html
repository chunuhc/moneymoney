<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>資料總覽</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --surface-alt: #f0ede6;
    --border: #e2ddd5;
    --border-light: #ede9e2;
    --text-primary: #1a1916;
    --text-secondary: #6b6760;
    --text-muted: #9e9992;
    --accent: #2d5a3d;
    --accent-light: #e8f0eb;
    --accent-mid: #4a7c5e;
    --danger: #c0392b;
    --row-even: #faf9f6;
    --row-hover: #f0ede6;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #17161a;
      --surface: #1e1d21;
      --surface-alt: #252429;
      --border: #2e2d32;
      --border-light: #28272c;
      --text-primary: #f0ede8;
      --text-secondary: #9e9b96;
      --text-muted: #5e5c58;
      --accent: #6ab588;
      --accent-light: #1a2e22;
      --accent-mid: #4a9067;
      --danger: #e05c4e;
      --row-even: #1b1a1e;
      --row-hover: #252429;
    }
  }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .page-wrapper {
    max-width: 1100px;
    margin: 0 auto;
  }

  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .header-left h1 {
    font-size: 1.6rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text-primary);
    line-height: 1.2;
  }

  .header-left .subtitle {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 4px;
    font-weight: 300;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.03em;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex-wrap: wrap;
  }

  .last-updated {
    font-size: 0.75rem;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
  }

  .btn-refresh {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 0.82rem;
    font-weight: 500;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
  }

  .btn-refresh:hover { opacity: 0.85; }
  .btn-refresh:active { transform: scale(0.97); }
  .btn-refresh:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-refresh svg {
    transition: transform 0.5s;
  }

  .btn-refresh.loading svg {
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .stats-bar {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
  }

  .stat-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 0.78rem;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .stat-chip strong {
    color: var(--text-primary);
    font-weight: 600;
    font-family: 'DM Mono', monospace;
  }

  .countdown-ring {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }

  .countdown-ring circle {
    fill: none;
    stroke: var(--border);
    stroke-width: 2;
  }

  .countdown-ring .progress {
    stroke: var(--accent-mid);
    stroke-dasharray: 37.7;
    stroke-dashoffset: 0;
    stroke-linecap: round;
    transform: rotate(-90deg);
    transform-origin: 50% 50%;
    transition: stroke-dashoffset 1s linear;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .table-scroll {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.875rem;
  }

  thead th {
    text-align: left;
    padding: 14px 16px;
    font-size: 0.72rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    background: var(--surface-alt);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  tbody tr {
    border-bottom: 1px solid var(--border-light);
    transition: background 0.1s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:nth-child(even) { background: var(--row-even); }
  tbody tr:hover { background: var(--row-hover); }

  tbody td {
    padding: 13px 16px;
    color: var(--text-primary);
    vertical-align: middle;
  }

  tbody td:first-child {
    font-weight: 500;
  }

  .badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 100px;
    font-size: 0.72rem;
    font-weight: 500;
    white-space: nowrap;
  }

  .empty-state, .error-state, .loading-state {
    padding: 4rem 2rem;
    text-align: center;
  }

  .state-icon {
    font-size: 2.5rem;
    margin-bottom: 1rem;
    display: block;
    opacity: 0.3;
  }

  .state-title {
    font-size: 1rem;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 0.5rem;
  }

  .state-desc {
    font-size: 0.82rem;
    color: var(--text-muted);
  }

  .loading-dots {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 1rem;
  }

  .loading-dots span {
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    opacity: 0.3;
    animation: pulse 1.2s ease-in-out infinite;
  }

  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 100% { opacity: 0.2; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1); }
  }

  .error-state .state-title { color: var(--danger); }

  @media (max-width: 600px) {
    body { padding: 1rem 0.75rem; }
    header { flex-direction: column; align-items: flex-start; }
    .header-left h1 { font-size: 1.3rem; }
    thead th, tbody td { padding: 10px 12px; }
  }
</style>
</head>
<body>
<div class="page-wrapper">
  <header>
    <div class="header-left">
      <h1>資料總覽</h1>
      <div class="subtitle" id="last-updated">尚未載入</div>
    </div>
    <div class="header-right">
      <button class="btn-refresh" id="refresh-btn" onclick="loadData()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"></polyline>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
        </svg>
        重新整理
      </button>
    </div>
  </header>

  <div class="stats-bar" id="stats-bar" style="display:none">
    <div class="stat-chip">共 <strong id="row-count">0</strong> 筆資料</div>
    <div class="stat-chip">
      <svg class="countdown-ring" viewBox="0 0 14 14">
        <circle cx="7" cy="7" r="6"></circle>
        <circle class="progress" cx="7" cy="7" r="6" id="countdown-ring"></circle>
      </svg>
      <span id="countdown-text">30</span> 秒後自動更新
    </div>
  </div>

  <div class="card">
    <div class="table-scroll" id="table-container">
      <div class="loading-state">
        <div class="loading-dots">
          <span></span><span></span><span></span>
        </div>
        <p class="state-title">載入資料中…</p>
      </div>
    </div>
  </div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/11-UoCe61e7SNDdhjuqMM_bap8vBh41EPPm3cZu6rhrk/export?format=csv&gid=1';
const REFRESH_INTERVAL = 30;

let countdownTimer = null;
let countdownValue = REFRESH_INTERVAL;
const circumference = 2 * Math.PI * 6;

function updateCountdown() {
  countdownValue--;
  const ring = document.getElementById('countdown-ring');
  const text = document.getElementById('countdown-text');
  if (ring && text) {
    const offset = circumference * (countdownValue / REFRESH_INTERVAL);
    ring.style.strokeDashoffset = circumference - offset;
    text.textContent = countdownValue;
  }
  if (countdownValue <= 0) {
    loadData();
  }
}

function resetCountdown() {
  clearInterval(countdownTimer);
  countdownValue = REFRESH_INTERVAL;
  const ring = document.getElementById('countdown-ring');
  const text = document.getElementById('countdown-text');
  if (ring) ring.style.strokeDashoffset = 0;
  if (text) text.textContent = REFRESH_INTERVAL;
  countdownTimer = setInterval(updateCountdown, 1000);
}

function loadData() {
  const btn = document.getElementById('refresh-btn');
  const container = document.getElementById('table-container');

  btn.disabled = true;
  btn.classList.add('loading');
  container.innerHTML = `
    <div class="loading-state">
      <div class="loading-dots"><span></span><span></span><span></span></div>
      <p class="state-title">載入資料中…</p>
    </div>`;

  const url = CSV_URL + '&t=' + Date.now();

  fetch(url)
    .then(res => {
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.text();
    })
    .then(csvText => {
      const results = Papa.parse(csvText, {
        header: true,
        skipEmptyLines: true
      });

      btn.disabled = false;
      btn.classList.remove('loading');

      if (!results.data || results.data.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <span class="state-icon">📭</span>
            <p class="state-title">目前沒有資料</p>
            <p class="state-desc">試算表中沒有找到任何資料列</p>
          </div>`;
        document.getElementById('stats-bar').style.display = 'none';
        return;
      }

      renderTable(results.meta.fields, results.data);
      const now = new Date();
      document.getElementById('last-updated').textContent =
        '最後更新：' + now.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      document.getElementById('row-count').textContent = results.data.length;
      document.getElementById('stats-bar').style.display = 'flex';
      resetCountdown();
    })
    .catch(err => {
      btn.disabled = false;
      btn.classList.remove('loading');
      container.innerHTML = `
        <div class="error-state">
          <span class="state-icon">⚠️</span>
          <p class="state-title">無法載入資料</p>
          <p class="state-desc">請確認試算表已設為「知道連結的人可檢視」<br>錯誤：${err.message || '未知錯誤'}</p>
        </div>`;
      document.getElementById('stats-bar').style.display = 'none';
    });
}

function renderTable(fields, rows) {
  const container = document.getElementById('table-container');
  let html = '<table><thead><tr>';
  fields.forEach(f => { html += `<th>${escHtml(f)}</th>`; });
  html += '</tr></thead><tbody>';

  rows.forEach(row => {
    html += '<tr>';
    fields.forEach(f => {
      const val = row[f] != null ? String(row[f]) : '';
      html += `<td>${formatCell(val)}</td>`;
    });
    html += '</tr>';
  });

  html += '</tbody></table>';
  container.innerHTML = html;
}

function formatCell(val) {
  if (val === '' || val == null) return '<span style="color:var(--text-muted)">—</span>';
  if (/^https?:\/\//i.test(val)) return `<a href="${escHtml(val)}" target="_blank" style="color:var(--accent-mid);text-decoration:none;border-bottom:1px solid var(--border)">${escHtml(val.length > 40 ? val.slice(0, 40) + '…' : val)}</a>`;
  return escHtml(val);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadData();
</script>
</body>
</html>
